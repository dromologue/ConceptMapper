name: App (build guard)

# Compile guard for the macOS app: an unsigned, build-only check so a change
# that breaks the Swift shell, project.yml, or the bridge↔FileHandler contract
# fails before it can merge to master. Tests (rust/web) run in the separate
# ci.yml jobs.
#
# `--verify` uses the committed Resources/web (the bundled SPA) rather than
# rebuilding it, so this gate exercises exactly the Swift/Xcode surface.
on:
  push:
    branches: [master]
    paths-ignore:
      - '**/*.md'
      - '**/*.markdown'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**/*.md'
      - '**/*.markdown'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Build macOS app (unsigned)
        run: scripts/build-app.sh --platform=mac --verify
