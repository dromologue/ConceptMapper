name: ConceptLLM
options:
  bundleIdPrefix: com.dromologue
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
  configs:
    Debug:
      CODE_SIGN_IDENTITY: "Apple Development"
    Release:
      CODE_SIGN_IDENTITY: "Apple Development"
targets:
  ConceptLLM:
    type: application
    platform: macOS
    sources:
      - path: ConceptLLM
        type: group
        excludes:
          - "*.entitlements"
          - "Info.plist"
      - path: Resources/web
        type: folder
        buildPhase: resources
      - path: Resources/templates
        type: folder
        buildPhase: resources
      - path: Resources/bin
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dromologue.ConceptLLM
        INFOPLIST_FILE: ConceptLLM/Info.plist
        CODE_SIGN_ENTITLEMENTS: ConceptLLM/ConceptLLM.entitlements
        PRODUCT_NAME: ConceptLLM
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: "4EDT4L4DYU"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: "YES"
