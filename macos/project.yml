name: ConceptMapper
options:
  bundleIdPrefix: com.dromologue
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
  # CODE_SIGN_IDENTITY intentionally omitted: with CODE_SIGN_STYLE=Automatic,
  # Xcode chooses Apple Development for `build` and Apple Distribution for `archive`
  # (the archive's export method comes from ExportOptions.plist).
targets:
  ConceptMapper:
    type: application
    platform: macOS
    sources:
      - path: ConceptMapper
        type: group
        excludes:
          - "*.entitlements"
          - "Info.plist"
      - path: Resources/web
        type: folder
        buildPhase: resources
      - path: Resources/templates
        type: folder
        buildPhase: resources
      - path: Resources/maps
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dromologue.ConceptMapper
        INFOPLIST_FILE: ConceptMapper/Info.plist
        CODE_SIGN_ENTITLEMENTS: ConceptMapper/ConceptMapper.entitlements
        PRODUCT_NAME: ConceptMapper
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.1"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: "4EDT4L4DYU"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: "YES"
schemes:
  ConceptMapper:
    build:
      targets:
        ConceptMapper: all
    run:
      config: Debug
    archive:
      config: Release
